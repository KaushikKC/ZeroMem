services:
  zeromem-postgres:
    image: pgvector/pgvector:pg16
    container_name: zeromem-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: zeromem
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - zeromem_postgres_data:/var/lib/postgresql/data

volumes:
  zeromem_postgres_data:
